const container = document.getElementById('tos-content');
let i = 0;

function typeWriter() {
    if (i < text.length) {
        let char = text.charAt(i);
        let span = document.createElement('span');
        
        // Aplicar estilos según el contenido
        if (char === '📜' || (i > 0 && text.substring(i-30, i).includes('Términos'))) {
            span.className = 'header';
        } else if (!isNaN(char) && text.charAt(i+1) === '.') {
            span.className = 'title';
        } else if (text.substring(i, i+10).includes('No Reembolso') || text.substring(i, i+10).includes('baneo')) {
            span.className = 'important';
        } else {
            span.className = 'normal';
        }

        span.textContent = char;
        container.appendChild(span);
        i++;
        setTimeout(typeWriter, 5); // Velocidad de escritura en ms
    }
}

window.onload = typeWriter;
</script>
