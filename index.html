<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOS - Términos y Condiciones Oficiales</title>
    <style>
        :root {
            --fondo: #000000;
            --fondo-caja: #050505;
            --azul: #0000FF;
            --rojo: #FF0000;
            --morado: #8A2BE2;
            --texto: #FFFFFF;
            --borde: #1a1a1a;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--fondo);
            color: var(--texto);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ÍNDICE IZQUIERDA --- */
        #sidebar {
            width: 300px;
            background-color: #020202;
            border-right: 1px solid var(--azul);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #sidebar h2 {
            color: var(--morado);
            font-size: 1.2em;
            text-align: center;
            border-bottom: 1px solid var(--morado);
            padding-bottom: 10px;
        }

        .index-link {
            color: var(--texto);
            text-decoration: none;
            font-size: 0.9em;
            padding: 8px;
            border-radius: 4px;
            transition: 0.3s;
            border-left: 2px solid transparent;
        }

        .index-link:hover {
            background: #111;
            border-left: 2px solid var(--azul);
            color: var(--azul);
        }

        /* --- CONTENIDO DERECHA --- */
        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            background: radial-gradient(circle at top right, #000033, #000000);
        }

        .tos-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .tos-header h1 { color: var(--morado); font-size: 2.5em; }

        .apartado-caja {
            background-color: var(--fondo-caja);
            border: 1px solid var(--borde);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .apartado-caja:hover {
            border-color: var(--azul);
            transform: translateY(-5px);
        }

        .apartado-caja h2 {
            margin-top: 0;
            color: var(--azul);
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .typing-text {
            white-space: pre-wrap;
            line-height: 1.6;
        }

        /* Colores específicos dentro del texto */
        .txt-rojo { color: var(--rojo); font-weight: bold; }
        .txt-azul { color: var(--azul); }
        .txt-morado { color: var(--morado); }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--azul); border-radius: 10px; }
    </style>
</head>
<body>

<nav id="sidebar">
    <h2>ÍNDICE</h2>
    <div id="index-list"></div>
</nav>

<main id="main-content">
    <div class="tos-header">
        <h1>📜 Términos y Condiciones de Servicio (TOS)</h1>
        <p id="intro-text" class="typing-text"></p>
    </div>

    <div id="cajas-container">
        </div>
</main>

<script>
const tosData = [
    { n: "1", t: "Política Estricta de No Reembolso", c: "Debido a la naturaleza digital de nuestros productos (scripts, archivos, servicios de configuración y diseños), todas las ventas son finales.\n\nSin excepciones: Una vez que el producto ha sido entregado o el servicio ha comenzado, no se realizarán devoluciones de dinero.\nSoftware y Scripts: Al ser productos intangibles y de copia inmediata, no es posible \"devolver\" el acceso una vez obtenido.\nDisputas: Cualquier intento de \"Chargeback\" o disputa a través de plataformas de pago (PayPal, Stripe, etc.) resultará en el baneo inmediato de todos nuestros servicios y la revocación de las licencias adquiridas." },
    { n: "2", t: "Categorías de Productos y Servicios", c: "🤖 Bots y Configuración de Discord\nLa compra de un bot o servicio de \"Discord Experto\" incluye la configuración inicial acordada.\nNo nos hacemos responsables de cambios en las políticas de Discord que puedan afectar el funcionamiento del bot a futuro.\n\n🎵 Packs de Música y Logos\nLos packs de música y diseños de logos son para uso exclusivo del comprador.\nProhibida la reventa: La redistribución o reventa de estos archivos sin autorización resultará en acciones legales y expulsión de la comunidad.\n\n🎮 FiveM (Scripts y Ropa)\nScripts: Se garantiza que el script funciona en la versión de base especificada (ej. ESX o QBcore). No nos hacemos responsables de incompatibilidades con scripts de terceros que ya tengas instalados.\nRopa: Asegúrate de que tu servidor soporte streaming de ropa personalizada antes de comprar. No se darán reembolsos si tu servidor no tiene los slots de Patreon necesarios para visualizarla." },
    { n: "3", t: "Soporte Técnico", c: "La compra de un producto incluye soporte relacionado estrictamente con la instalación básica.\nEl soporte no incluye modificaciones personalizadas del código o diseño a menos que se haya pagado un extra por dicho servicio." },
    { n: "4", t: "Responsabilidad del Cliente", c: "Es deber del cliente:\n\nVerificar que cumple con los requisitos técnicos para usar el producto.\nProporcionar los datos correctos para la entrega (ID de Discord, correos, etc.).\nMantener copias de seguridad de sus archivos. No garantizamos el reenvío de archivos perdidos por el cliente meses después de la compra." },
    { n: "5", t: "Garantía de Funcionamiento y Pruebas", c: "Pruebas en Entorno Real: Todos los Scripts de FiveM y Bots de Discord han sido testeados y verificados en nuestros propios servidores antes de ser puestos a la venta.\nDemostración: El cliente acepta que el producto funciona correctamente basándose en las pruebas realizadas en nuestro entorno. No nos hacemos responsables si el cliente modifica el código base y rompe su funcionalidad." },
    { n: "6", t: "Alojamiento (Hosting) de Bots de Discord", c: "Ofrecemos el servicio de alojamiento de bots en nuestras máquinas bajo las siguientes condiciones:\n\nPlanes y Pagos: El precio del alojamiento se rige por el plan contratado (Mensual/Trimestral/Anual). El servicio debe ser renovado antes de la fecha de vencimiento.\nPeriodo de Gracia y Corte: Una vez finalizado el tiempo contratado, si no se ha recibido el pago, el sistema otorgará un margen de 24 horas adicionales con previo aviso.\nSuspensión: Transcurridas las 24 horas de gracia sin que se efectúe el pago, el bot será apagado permanentemente y los archivos podrían ser eliminados de la máquina." },
    { n: "7", t: "Responsabilidad Legal y Uso Malicioso", c: "El cliente (quien contrata y está a cargo de la gestión del bot/maquina) es el único responsable legal del uso que se le dé al software:\n\nUso Indebido: Cualquier actividad maliciosa realizada a través de nuestros servidores o scripts (ataques DDoS, robo de datos, spam masivo, violación de los TOS de Discord o FiveM, etc.) será responsabilidad exclusiva del cliente.\nExención de Responsabilidad: El proyecto y sus administradores quedan totalmente eximidos de cualquier culpabilidad legal derivada de las acciones del usuario.\nTerminación de Contrato: El uso del servicio para fines ilícitos o maliciosos causará la terminación inmediata del servicio sin derecho a réplica ni devolución." },
    { n: "8", t: "Política de No Reembolso (Recordatorio)", c: "Como se mencionó anteriormente, al ser productos digitales y servicios de consumo inmediato (hosting), no se realizan devoluciones bajo ningún concepto. Al realizar el pago, confirmas que has leído y aceptado que la venta es final.\n\n⚠️ Resumen de Obligaciones\nNosotros: Entregamos software probado y funcional.\nNosotros: Damos 24h de cortesía tras el vencimiento del hosting.\nEl Cliente: Es responsable de cualquier uso legal o ilegal de su bot/maquina.\nEl Cliente: Acepta que no hay reembolsos tras la compra." },
    { n: "9", t: "Derecho de Admisión y Modificación", c: "Reservado el derecho: El equipo administrativo se reserva el derecho de rechazar la venta o el servicio a cualquier usuario que haya mostrado comportamientos tóxicos, historial de estafas o faltas de respeto previas.\nCambios en los Términos: Nos reservamos el derecho de actualizar estos términos en cualquier momento. El uso continuo de nuestros servicios tras un cambio implica la aceptación de los nuevos términos." },
    { n: "10", t: "Actualizaciones de Scripts y Compatibilidad", c: "Actualizaciones: La compra de un script incluye la versión actual al momento del pago. Las actualizaciones futuras (updates) pueden ser gratuitas o de pago según el criterio del desarrollador.\nVersiones de Software: No garantizamos que un script o ropa de FiveM funcione en versiones de \"Artifacts\" o \"Builds\" obsoletas o extremadamente experimentales. El cliente debe estar actualizado." },
    { n: "11", t: "Prohibición de \"Leaks\" y Reventa (Muy importante)", c: "Propiedad Intelectual: Al comprar un producto, adquieres una licencia de uso, no la propiedad del código o diseño.\nSanción por Reventa: Si se detecta que un cliente está filtrando (leaking), compartiendo o revendiendo nuestros scripts, ropa o logos, se procederá al baneo inmediato de toda la red, eliminación de licencias y reporte a las listas negras (blacklists) de la comunidad de FiveM/Discord." },
    { n: "12", t: "Limitación de Responsabilidad (Daños indirectos)", c: "Caídas de Servidor: No nos hacemos responsables de pérdidas económicas, de datos o de usuarios en tu servidor de FiveM debido a un mal uso de los scripts o fallos técnicos externos.\nBaneos de Plataformas: No somos responsables si el uso de ciertos bots o scripts infringe las normativas externas de Discord o CFX (FiveM) y resulta en el baneo de tu servidor o cuenta." },
    { n: "13", t: "Tiempo de Entrega y \"Customs\"", c: "Plazos: Los productos automáticos son inmediatos. Los trabajos personalizados (logos, configuración experta) tienen un plazo de entrega estimado. Un retraso razonable no es motivo de reembolso.\nRevisiones: En logos o música, se incluyen un máximo de 2 revisiones gratuitas. Cambios extra tendrán un coste adicional." },
    { n: "14", t: "Abuso del Soporte", c: "Comportamiento: No se dará soporte a usuarios que falten el respeto, insulten o presionen al equipo técnico de forma constante (spam). El soporte es un privilegio, no una vía para el acoso.\nÁmbito del Soporte: El soporte es para errores del producto, no para enseñarte a programar o para configurar otros scripts ajenos a nuestra tienda." },
    { n: "15", t: "Verificación de Identidad y Fraude", c: "Prevención de Fraude: Nos reservamos el derecho de solicitar una captura de pantalla del historial de pagos o una verificación de identidad si el sistema detecta una transacción sospechosa.\nRetención de Producto: El producto no se entregará hasta que el pago haya sido verificado y confirmado como \"completado\" en nuestra plataforma de cobro." },
    { n: "16", t: "Inactividad y Caducidad de Tickets", c: "Cierre de Tickets: Si un cliente abre un ticket de compra o soporte y no responde en un plazo de 48 horas, el ticket será cerrado automáticamente.\nReclamaciones Tardías: No se aceptarán reclamaciones sobre productos comprados hace más de 15 días si el cliente no reportó el fallo en el momento de la instalación inicial." },
    { n: "17", t: "Modificaciones por Terceros", c: "Pérdida de Garantía: Cualquier intento de modificar el código fuente de un bot o script por parte del cliente o de un programador ajeno a nuestro equipo anula automáticamente cualquier derecho a soporte técnico. No arreglamos errores causados por manipulaciones externas." },
    { n: "18", t: "Disponibilidad del Servicio (Uptime)", c: "Mantenimiento: Aunque nos esforzamos por un 99% de disponibilidad, no nos hacemos responsables de interrupciones temporales del servicio de hosting debido a mantenimientos programados, fallos en los centros de datos o ataques externos (DDoS) ajenos a nuestro control directo." },
    { n: "19", t: " \"Logs\" y Privacidad", c: "Registro de Actividad: Al usar nuestros bots o máquinas, aceptas que se puedan generar \"logs\" (registros) de errores y actividad para mejorar el servicio y prevenir abusos.\nPrivacidad: Tus datos de compra son confidenciales y nunca serán vendidos a terceros, salvo requerimiento judicial por uso ilícito de la máquina." },
    { n: "20", t: "Jurisdicción y Validez de la Prueba Digital", c: "Consentimiento por Acción: El cliente acepta que el registro (log) del bot de tickets de Discord, que muestra su interacción con el botón de \"Aceptar Términos\", actúa como una firma digital vinculante.\nPrueba ante Disputas: En caso de reclamación, este registro será presentado como prueba irrefutable de que el cliente conocía y aceptó la política de No Reembolso." },
    { n: "21", t: "Requisitos de \"Escrow\" (Protección de CFX)", c: "Vinculación de cuenta: Para productos de FiveM que utilicen el sistema de protección de activos de CFX.re (Escrow), el cliente es responsable de proporcionar la cuenta de Tebex/Keymaster correcta.\nError de Cuenta: No nos hacemos responsables si el cliente vincula el producto a una cuenta de Keymaster equivocada. La transferencia de activos entre cuentas dependerá exclusivamente de la aprobación de CFX.re, no de nosotros." },
    { n: "22", t: "Política de \"Chargeback\" Preventiva", c: "Reporte a Comunidades: El cliente acepta que, en caso de realizar un contracargo fraudulento (chargeback) después de recibir el producto, sus datos (ID de Discord, Steam ID y motivo) podrán ser compartidos en servidores de \"Blacklist\" y con otros vendedores para prevenir futuros fraudes en la comunidad." },
    { n: "23", t: "Errores de Precio o Stock", c: "Errores Tipográficos: Nos reservamos el derecho de cancelar una orden si el producto tenía un precio erróneo debido a un fallo técnico o humano. En ese caso, se notificará al cliente y se le ofrecerá la opción de pagar la diferencia o recibir un crédito en la tienda (a discreción de la administración)." },
    { n: "24", t: "Prohibición de Ingeniería Inversa", c: "Análisis de Código: Queda estrictamente prohibido intentar descompilar, \"ofuscar\" de nuevo o realizar ingeniería inversa sobre los scripts o bots entregados para entender su funcionamiento interno o extraer métodos de seguridad. Esto se considera una violación de la licencia y anula todo soporte." },
    { n: "25", t: "Fuerza Mayor", c: "Causas Externas: No seremos responsables de retrasos o fallos en el servicio causados por eventos fuera de nuestro control, tales como caídas globales de Discord, cambios repentinos en la API de Telegram/Discord, cierres de plataformas como CFX.re o problemas de red a nivel nacional/internacional." },
    { n: "26", t: "Pagos Mediante Métodos Externos (Amigos y Familiares)", c: "Naturaleza del Envío: Si el pago se realiza a través de plataformas que permiten el envío como \"Amigos y Familiares\" (ej. PayPal), el cliente acepta que lo hace de forma voluntaria para evitar comisiones adicionales y reconoce que, al elegir esta modalidad, confirma la recepción satisfactoria del producto de forma anticipada.\nProhibición de Notas Engañosas: Queda prohibido añadir notas en el pago que contradigan la realidad del servicio (ej. poner \"préstamo\" o \"regalo\" para luego reclamar). Cualquier discrepancia en las notas de pago será usada como prueba de mala fe ante la plataforma de pago." },
    { n: "27", t: "Requisitos de Mayoría de Edad", c: "Capacidad Legal: Al realizar una compra, el cliente declara ser mayor de edad o contar con la autorización expresa de sus padres o tutores legales para el uso de los fondos. No se realizarán reembolsos alegando \"compras accidentales por menores de edad\", siendo responsabilidad del titular de la cuenta la seguridad de sus datos de pago." },
    { n: "28", t: "Acceso a Descargas y Caducidad de Enlaces", c: "Disponibilidad de Enlaces: Los enlaces de descarga o la entrega de archivos tienen una validez de 7 días desde el momento de la compra. Es responsabilidad del cliente descargar y asegurar el producto en este plazo.\nRe-emisión de Archivos: Pasado este tiempo, si el cliente pierde los archivos, la administración no está obligada a reenviarlos de forma gratuita, pudiendo aplicar una tasa administrativa por \"re-gestión de archivos\"." },
    { n: "29", t: "Modificaciones de las Plataformas Base (Discord/FiveM/Tebex)", c: "Actualizaciones de API: Si Discord, CFX.re o Tebex realizan cambios en sus términos de servicio o en su código que dejen obsoletos nuestros productos, haremos lo posible por actualizarlos, pero el cliente acepta que no somos responsables de las limitaciones impuestas por estas empresas externas." },
    { n: "30", t: "Acuerdo de Confidencialidad sobre Soporte", c: "Prohibición de Filtrar Tickets: Queda prohibido compartir capturas de pantalla o grabaciones de los tickets de soporte, conversaciones privadas con el staff o métodos de resolución de errores sin consentimiento previo. Filtrar esta información con el fin de dañar la imagen del servidor resultará en la revocación de todas las licencias del cliente." },
    { n: "31", t: "Clausula de Sentido Común y Comportamiento", c: "Interpretación de los Términos: La administración se reserva el derecho de interpretar estos términos ante situaciones no previstas. Cualquier intento de buscar \"vacíos legales\" en esta normativa para perjudicar al servidor será motivo de sanción.\nRespeto a la Comunidad: El comportamiento errático, las amenazas de difamación o el intento de sabotaje a otros clientes o al staff resultará en la terminación inmediata de todos tus servicios, sin derecho a reembolso, basándonos en el incumplimiento del código de conducta del servidor." },
    { n: "32", t: "Compras para Terceros y Regalos (Gifts)", c: "Responsabilidad del Comprador: Si realizas una compra para un tercero, pierdes el control sobre la licencia una vez entregada al destinatario final. No se realizarán cambios de propietario de licencia a menos que haya una justificación de fuerza mayor aceptada por el staff.\nDisputas entre Usuarios: No intervenimos en conflictos personales entre usuarios. Si compras algo para alguien y luego te arrepientes, no se hará devolución del dinero ni se retirará el producto al destinatario para devolvértelo a ti." },
    { n: "33", t: "Clausula de Sentido Común y Comportamiento (BIS)", c: "Interpretación de los Términos: La administración se reserva el derecho de interpretar estos términos ante situaciones no previstas. Cualquier intento de buscar \"vacíos legales\" en esta normativa para perjudicar al servidor será motivo de sanción.\nRespeto a la Comunidad: El comportamiento errático, las amenazas de difamación o el intento de sabotaje a otros clientes o al staff resultará en la terminación inmediata de todos tus servicios, sin derecho a reembolso, basándonos en el incumplimiento del código de conducta del servidor." },
    { n: "34", t: "Ciclo de Vida del Soporte y Obsolescencia", c: "Periodo de Soporte Activo: El soporte técnico gratuito para la instalación y errores del producto está garantizado por un periodo de 30 días tras la compra.\nProductos Descatalogados: Si un producto es retirado de la tienda o deja de recibir actualizaciones por parte del desarrollador (EoL - End of Life), el soporte para dicho producto cesará. No estamos obligados a hacer funcionar productos antiguos en sistemas o versiones de servidores nuevas." },
    { n: "35", t: "Prohibición de Coacción y Reseñas Falsas", c: "Chantaje por Soporte: Queda prohibido el uso de amenazas con reseñas negativas, reportes falsos o difamación para obtener beneficios extra, reembolsos o soporte prioritario.\nSanción: Cualquier intento de coacción resultará en la cancelación inmediata de todos los servicios y el baneo del servidor sin derecho a réplica." },
    { n: "36", t: "Requisitos de Hardware y Software del Cliente", c: "Entorno del Cliente: Es responsabilidad del cliente tener un PC y una conexión a internet capaces de ejecutar los programas necesarios (FiveM, Discord, Visual Studio Code, etc.).\nFallo Local: No se darán reembolsos ni soporte extendido si el producto no funciona debido a virus en el PC del cliente, bloqueos de firewall, ISPs con puertos cerrados o hardware insuficiente." },
    { n: "37", t: "Idioma y Comunicación", c: "Idioma Oficial: El soporte y la documentación se ofrecen principalmente en Español. No somos responsables de malentendidos derivados de traducciones automáticas realizadas por el cliente si este habla otro idioma." }
];

const intro = "Al realizar cualquier compra en este servidor, aceptas automáticamente los términos detallados a continuación. Es responsabilidad del comprador leerlos antes de efectuar cualquier pago.";
const indexContainer = document.getElementById('index-list');
const boxesContainer = document.getElementById('cajas-container');

// FUNCIÓN PARA EFECTO LETRA POR LETRA
function typeEffect(element, text, speed = 5) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

// GENERAR ESTRUCTURA
tosData.forEach((item) => {
    // Crear enlace índice
    const link = document.createElement('a');
    link.href = `#seccion-${item.n}`;
    link.className = 'index-link';
    link.textContent = `${item.n}. ${item.t}`;
    indexContainer.appendChild(link);

    // Crear Caja de Contenido
    const caja = document.createElement('div');
    caja.id = `seccion-${item.n}`;
    caja.className = 'apartado-caja';
    caja.innerHTML = `<h2>${item.n}. ${item.t}</h2><div class="typing-text" id="text-${item.n}"></div>`;
    boxesContainer.appendChild(caja);
});

// INICIAR EFECTO DE ESCRITURA
window.onload = () => {
    typeEffect(document.getElementById('intro-text'), intro, 10);
    tosData.forEach(item => {
        const el = document.getElementById(`text-${item.n}`);
        typeEffect(el, item.c, 2);
    });
};
</script>

</body>
</html>
